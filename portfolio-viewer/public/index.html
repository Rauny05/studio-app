<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

    /* ── Reset & base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #121212;
      --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.07);
      --text: #f0ede8;
      --muted: rgba(240,237,232,0.45);
      --accent: #c9a96e;
      --accent-dim: rgba(201,169,110,0.15);
      --overlay: rgba(10,10,10,0.85);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── CSS noise grain — pure CSS, no external images ──────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 28px 48px 24px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .logo em {
      font-style: italic;
      color: var(--accent);
    }

    .project-count {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── Main layout ──────────────────────────────────────────────── */
    main {
      padding: 120px 48px 64px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ── Skeleton loader ──────────────────────────────────────────── */
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }

    .skeleton {
      background: var(--surface2);
      border-radius: 2px;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .skeleton-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1.5fr;
      grid-template-rows: auto;
      gap: 2px;
    }

    .skeleton-card {
      background: var(--surface);
      animation: pulse 1.8s ease-in-out infinite;
    }

    .skeleton-card:nth-child(1) { height: 420px; grid-row: span 2; }
    .skeleton-card:nth-child(2) { height: 200px; }
    .skeleton-card:nth-child(3) { height: 200px; grid-column: span 2; animation-delay: 0.1s; }
    .skeleton-card:nth-child(4) { height: 210px; animation-delay: 0.15s; }
    .skeleton-card:nth-child(5) { height: 210px; animation-delay: 0.2s; }
    .skeleton-card:nth-child(6) { height: 210px; grid-column: span 2; animation-delay: 0.25s; }

    /* ── Project grid — asymmetric ────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1.5fr;
      gap: 2px;
    }

    .card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      min-height: 240px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    /* Asymmetric sizing pattern — cycles through 3 layouts */
    .card:nth-child(7n+1) { grid-column: span 2; min-height: 400px; }
    .card:nth-child(7n+2) { grid-column: span 1; min-height: 220px; }
    .card:nth-child(7n+3) { grid-column: span 1; min-height: 220px; }
    .card:nth-child(7n+4) { grid-column: span 1; min-height: 320px; }
    .card:nth-child(7n+5) { grid-column: span 2; min-height: 280px; }
    .card:nth-child(7n+6) { grid-column: span 1; min-height: 280px; }
    .card:nth-child(7n+0) { grid-column: span 2; min-height: 360px; }

    .card-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* Placeholder gradient when no image */
    .card-bg.no-image {
      background: linear-gradient(135deg, var(--surface2) 0%, #1e1a14 100%);
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(10,10,10,0.92) 0%,
        rgba(10,10,10,0.3) 50%,
        transparent 100%
      );
      transition: background 0.4s ease;
    }

    .card-hover-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,10,0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.4s ease;
    }

    .card-cta {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 10px 24px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .card:hover .card-bg { transform: scale(1.04); }
    .card:hover .card-hover-overlay { background: rgba(10,10,10,0.45); }
    .card:hover .card-cta { opacity: 1; transform: translateY(0); }

    .card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 24px;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-count {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Empty state ──────────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 16px;
      text-align: center;
    }

    .empty-state .icon {
      font-size: 3rem;
      opacity: 0.3;
    }

    .empty-state h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      color: var(--muted);
    }

    .empty-state p {
      font-size: 0.85rem;
      color: var(--muted);
      max-width: 320px;
      line-height: 1.6;
    }

    /* ── Error state ──────────────────────────────────────────────── */
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 20px;
      text-align: center;
    }

    .error-state h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      color: var(--muted);
    }

    .error-state p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .btn-retry {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 12px 32px;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .btn-retry:hover {
      background: var(--accent);
      color: var(--bg);
    }

    /* ── Right panel ──────────────────────────────────────────────── */
    .panel-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.6);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .panel-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(680px, 90vw);
      background: var(--surface);
      z-index: 101;
      transform: translateX(100%);
      transition: transform 0.42s cubic-bezier(0.16, 1, 0.3, 1);
      overflow-y: auto;
      overscroll-behavior: contain;
      border-left: 1px solid var(--border);
    }

    .panel.open {
      transform: translateX(0);
    }

    .panel-header {
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      z-index: 2;
    }

    .panel-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .panel-file-count {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .btn-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      padding: 4px 8px;
      margin-left: 8px;
      transition: color 0.2s ease;
    }

    .btn-close:hover { color: var(--text); }

    .panel-body {
      padding: 28px 32px 48px;
    }

    /* Section labels */
    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      margin-top: 32px;
    }

    .section-label:first-child { margin-top: 0; }

    /* Image masonry using CSS columns */
    .image-masonry {
      columns: 3;
      column-gap: 4px;
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 4px;
      display: block;
      cursor: zoom-in;
    }

    .masonry-item img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
      transition: opacity 0.3s ease;
    }

    .masonry-item img:hover { opacity: 0.85; }

    /* Video list */
    .video-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .video-list video {
      width: 100%;
      border-radius: 2px;
      background: #000;
    }

    .video-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    /* PDF list */
    .pdf-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pdf-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--surface2);
      color: var(--text);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      transition: background 0.2s ease;
      border: 1px solid var(--border);
    }

    .pdf-link:hover { background: var(--accent-dim); }

    .pdf-icon {
      color: var(--accent);
      font-size: 1rem;
      flex-shrink: 0;
    }

    /* Panel loading */
    .panel-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Lightbox ─────────────────────────────────────────────────── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.97);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      display: block;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    .lb-close {
      position: absolute;
      top: 24px; right: 32px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.5rem;
      transition: color 0.2s ease;
    }

    .lb-close:hover { color: var(--text); }

    .lb-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 14px 18px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .lb-arrow:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    .lb-prev { left: 24px; }
    .lb-next { right: 24px; }

    .lb-counter {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    /* ══════════════════════════════════════════════════════════════
       MOBILE — purpose-built, not just responsive
    ══════════════════════════════════════════════════════════════ */
    @media (max-width: 767px) {
      header {
        padding: 18px 20px;
      }

      .logo { font-size: 1.2rem; }

      main {
        padding: 80px 0 100px;
      }

      /* Single-column full-width cards, 16:9 */
      .grid {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .card,
      .card:nth-child(n) {
        grid-column: unset;
        min-height: unset;
        width: 100%;
        aspect-ratio: 16 / 9;
      }

      /* No hover states on mobile */
      .card:hover .card-bg { transform: none; }
      .card:hover .card-hover-overlay { background: transparent; }
      .card:hover .card-cta { opacity: 0; }

      .card-name { font-size: 1.2rem; }

      /* Fixed bottom nav */
      .bottom-nav {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 50;
        background: rgba(10,10,10,0.95);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid var(--border);
        padding: 12px 24px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .nav-home-icon {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 50%;
        font-size: 1rem;
        color: var(--muted);
      }

      .nav-label {
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
      }

      /* Bottom sheet */
      .panel {
        top: unset;
        right: 0;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 90vh;
        border-radius: 16px 16px 0 0;
        border-left: none;
        border-top: 1px solid var(--border);
        transform: translateY(100%);
        transition: transform 0.42s cubic-bezier(0.16, 1, 0.3, 1);
        overflow-y: auto;
      }

      .panel.open {
        transform: translateY(0);
      }

      /* Drag handle indicator */
      .sheet-handle {
        display: flex;
        justify-content: center;
        padding: 12px 0 4px;
        cursor: pointer;
      }

      .sheet-handle::before {
        content: '';
        width: 40px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        display: block;
      }

      .panel-header {
        padding: 8px 24px 16px;
        flex-wrap: wrap;
      }

      .panel-title { font-size: 1.3rem; }
      .panel-body { padding: 20px 20px 40px; }

      /* Horizontally scrollable media strip with snap */
      .image-masonry {
        columns: unset;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 8px;
        scrollbar-width: none;
      }

      .image-masonry::-webkit-scrollbar { display: none; }

      .masonry-item {
        flex: 0 0 85vw;
        scroll-snap-align: start;
        break-inside: unset;
        margin-bottom: 0;
        aspect-ratio: 4/3;
        overflow: hidden;
      }

      .masonry-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Lightbox full-screen on mobile */
      .lightbox img {
        max-width: 100vw;
        max-height: 100vh;
      }

      .lb-arrow { padding: 12px 14px; }
      .lb-prev { left: 8px; }
      .lb-next { right: 8px; }
    }

    /* ── Desktop nav (hide on mobile) ────────────────────────────── */
    .bottom-nav { display: none; }
    @media (max-width: 767px) {
      .bottom-nav { display: flex; }
    }

    /* ── Download buttons ─────────────────────────────────────────── */
    .btn-dl {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 8px 16px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .btn-dl:hover { border-color: var(--accent); color: var(--accent); }
    .btn-dl.primary {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-dl.primary:hover {
      background: var(--accent);
      color: var(--bg);
    }

    /* Download icon overlay on each image in masonry */
    .masonry-item {
      position: relative;
    }
    .masonry-item .dl-overlay {
      position: absolute;
      top: 8px; right: 8px;
      width: 32px; height: 32px;
      background: rgba(10,10,10,0.75);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      color: var(--text);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
      text-decoration: none;
      z-index: 2;
    }
    .masonry-item:hover .dl-overlay { opacity: 1; }
    .masonry-item .dl-overlay:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    /* Download button row for videos */
    .video-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }

    /* Panel header download button */
    .panel-dl-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 32px 14px;
      border-bottom: 1px solid var(--border);
    }

    /* Header download-all button */
    .header-dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 7px 16px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
      margin-left: auto;
      margin-right: 12px;
    }
    .header-dl-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Card download button — top-right on hover */
    .card-dl {
      position: absolute;
      top: 14px; right: 14px;
      z-index: 3;
      width: 34px; height: 34px;
      background: rgba(10,10,10,0.78);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.25s, background 0.2s, border-color 0.2s;
      text-decoration: none;
    }
    .card:hover .card-dl { opacity: 1; }
    .card-dl:hover { background: var(--accent) !important; color: var(--bg) !important; border-color: var(--accent) !important; }

    /* Toast notification */
    .toast-container {
      position: fixed;
      bottom: 28px; right: 28px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 12px 20px;
      max-width: 280px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 767px) {
      .panel-dl-row { padding: 8px 20px 12px; }
      .card-dl { opacity: 1; width: 30px; height: 30px; font-size: 0.75rem; }
      .header-dl-btn { display: none; }
      .toast-container { bottom: 90px; right: 16px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Archive<em>.</em></div>
    <span class="project-count" id="projectCountLabel"></span>
    <a class="header-dl-btn" id="dlAllBtn" href="/download/all" aria-label="Download all projects">
      ↓ Download All
    </a>
  </header>
  <div class="toast-container" id="toastContainer"></div>

  <main id="main">
    <!-- Skeleton while loading -->
    <div class="skeleton-grid" id="skeletonGrid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
    <div class="grid" id="projectGrid" style="display:none;"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="icon">◻</div>
      <h2>No projects found</h2>
      <p>Add subfolders with media files to your portfolio root to get started.</p>
    </div>
    <div id="errorState" class="error-state" style="display:none;">
      <h2>Can't reach the server</h2>
      <p>Make sure the portfolio server is running on port 3000.</p>
      <button class="btn-retry" id="retryBtn">Retry</button>
    </div>
  </main>

  <!-- Mobile bottom nav -->
  <nav class="bottom-nav">
    <div class="nav-home-icon">⌂</div>
    <span class="nav-label" id="mobileNavLabel">—</span>
  </nav>

  <!-- Panel backdrop -->
  <div class="panel-backdrop" id="panelBackdrop"></div>

  <!-- Right panel / bottom sheet -->
  <div class="panel" id="panel" role="dialog" aria-modal="true" aria-label="Project files">
    <div class="sheet-handle" id="sheetHandle"></div>
    <div class="panel-header">
      <div class="panel-title" id="panelTitle"></div>
      <span class="panel-file-count" id="panelFileCount"></span>
      <button class="btn-close" id="panelClose" aria-label="Close panel">✕</button>
    </div>
    <div class="panel-dl-row">
      <a class="btn-dl primary" id="dlFolderBtn" href="#" aria-label="Download folder as zip">↓ Download Folder</a>
    </div>
    <div class="panel-body" id="panelBody">
      <div class="panel-loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lb-close" id="lbClose" aria-label="Close lightbox">✕</button>
    <button class="lb-arrow lb-prev" id="lbPrev" aria-label="Previous image">‹</button>
    <img id="lbImg" src="" alt="" />
    <button class="lb-arrow lb-next" id="lbNext" aria-label="Next image">›</button>
    <div class="lb-counter" id="lbCounter"></div>
    <button class="btn-dl" id="lbDownload" style="position:absolute;bottom:24px;right:32px;">↓ Download</button>
  </div>

  <script src="/app.js"></script>
</body>
</html>
